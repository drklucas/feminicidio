name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite disparo manual pela aba Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultâneos; cancela o anterior se um novo push chegar
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install openpyxl

      - name: Gerar site estático
        run: python generate_static.py

      - name: Upload do artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
