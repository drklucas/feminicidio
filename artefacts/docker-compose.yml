services:
  postgres:
    image: postgres:16
    container_name: feminicidio_db
    environment:
      POSTGRES_DB: feminicidio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - feminicidio_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  app:
    build: ./app
    container_name: feminicidio_app
    ports:
      - "8080:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: feminicidio
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  feminicidio_data:
